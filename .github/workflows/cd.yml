name: CD - Deploy to Public Service

on:
  push:
    branches: [ "main" ]
  release:
    types: [published]

jobs:
  terraform_infrastructure:
    name: Provision Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: "1.5.0"

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: "us-east-1"
        run: terraform apply -auto-approve
        working-directory: ./terraform
        continue-on-error: true # Continua en caso no haya credenciales de AWS

  build_and_deploy:
    name: Build & Deploy
    needs: terraform_infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Release
        run: cargo build --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: target/release/safebridge-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Public Service (Render/Railway/AWS)
        run: |
          echo "Desplegando la aplicación..."
          echo "Aquí se ejecutará el webhook o comando CLI de la plataforma pública elegida (ej. Render CLI, AWS SSM, etc.)"
          echo "Despliegue simulado exitoso."
